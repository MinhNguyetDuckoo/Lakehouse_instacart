services:
  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    restart: always

    ports:
      - "8081:8080"

    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor

    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow

    command: airflow standalone